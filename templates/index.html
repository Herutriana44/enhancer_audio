<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Enhancer - Demucs → Denoiser → Polish</title>
    <style>
        :root {
            --bg: #0f0f12;
            --surface: #1a1a20;
            --surface-hover: #22222a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
            --text: #e4e4e7;
            --text-muted: #71717a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--surface-hover);
            padding-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; font-weight: 600; color: var(--accent); }
        .version { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

        .upload-zone {
            border: 2px dashed var(--surface-hover);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            background: var(--surface);
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--surface-hover);
        }
        .upload-zone.has-file { border-color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .upload-zone input { display: none; }
        .upload-zone p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }

        .file-info {
            display: none;
            padding: 1rem 1.25rem;
            background: var(--surface);
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--success);
        }
        .file-info.visible { display: block; }
        .file-info .name { font-weight: 600; color: var(--success); }
        .file-info .meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
        .file-info .remove { margin-top: 0.5rem; font-size: 0.8rem; color: var(--error); cursor: pointer; text-decoration: underline; }

        .status-bar {
            display: none;
            padding: 1rem;
            background: var(--surface);
            border-radius: 8px;
            margin-bottom: 1rem;
            align-items: center;
            gap: 0.75rem;
        }
        .status-bar.visible { display: flex; }
        .status-bar .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--surface-hover);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-bar .text { flex: 1; }
        .status-bar.uploading { border-left: 4px solid var(--accent); }
        .status-bar.processing { border-left: 4px solid var(--warning); }
        .status-bar.success { border-left: 4px solid var(--success); }
        .status-bar.error { border-left: 4px solid var(--error); }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .log-section { margin-top: 2rem; }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .log-header h2 { font-size: 1rem; }
        .log-box {
            background: #0a0a0c;
            border: 1px solid var(--surface-hover);
            border-radius: 8px;
            padding: 1rem;
            height: 320px;
            overflow-y: auto;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        .log-line { font-family: inherit; white-space: pre-wrap; word-break: break-all; }
        .log-line.error { color: var(--error); }
        .result {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--surface);
            border-radius: 8px;
            display: none;
        }
        .result.success { display: block; border-left: 4px solid var(--success); }
        .result.error { display: block; border-left: 4px solid var(--error); }
        .result a { color: var(--accent); text-decoration: none; }
        .result a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Audio Enhancer</h1>
            <p class="version">v{{ version }} | Demucs → Denoiser (audio-denoiser) → Polish (noisereduce)</p>
        </header>

        <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept=".mp3,.wav,.flac,.m4a,.ogg,.aac,.wma,.mp4,.avi,.mkv,.mov,.webm,.flv,.wmv">
            <p><strong>Klik atau drag file</strong> untuk upload</p>
            <p>Audio: MP3, WAV, FLAC, M4A, OGG, AAC, WMA</p>
            <p>Video: MP4, AVI, MKV, MOV, WEBM, FLV, WMV</p>
        </div>

        <div class="file-info" id="fileInfo">
            <div class="name" id="fileName"></div>
            <div class="meta" id="fileMeta"></div>
            <div class="remove" id="removeFile">Hapus file</div>
        </div>

        <div class="status-bar" id="statusBar">
            <div class="spinner" id="statusSpinner"></div>
            <div class="text" id="statusText"></div>
        </div>

        <button class="btn" id="processBtn" disabled>Proses</button>

        <div class="log-section">
            <div class="log-header">
                <h2>Log Proses</h2>
                <button class="btn" id="refreshVersion" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Refresh Version</button>
            </div>
            <div class="log-box" id="logBox">
                <div class="log-line" id="versionInfo">Memuat info versi...</div>
            </div>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileMeta = document.getElementById('fileMeta');
        const removeFile = document.getElementById('removeFile');
        const statusBar = document.getElementById('statusBar');
        const statusSpinner = document.getElementById('statusSpinner');
        const statusText = document.getElementById('statusText');
        const processBtn = document.getElementById('processBtn');
        const logBox = document.getElementById('logBox');
        const result = document.getElementById('result');
        const versionInfo = document.getElementById('versionInfo');

        let selectedFile = null;

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function showStatus(text, state) {
            statusBar.classList.add('visible');
            statusBar.classList.remove('uploading', 'processing', 'success', 'error');
            if (state) statusBar.classList.add(state);
            statusText.textContent = text;
            statusSpinner.style.display = (state === 'uploading' || state === 'processing') ? 'block' : 'none';
        }

        function hideStatus() {
            statusBar.classList.remove('visible');
        }

        function loadVersion() {
            fetch('/api/version')
                .then(r => r.json())
                .then(data => {
                    versionInfo.textContent = data.info;
                    versionInfo.className = 'log-line';
                })
                .catch(() => {
                    versionInfo.textContent = 'Gagal memuat info versi';
                    versionInfo.className = 'log-line error';
                });
        }
        loadVersion();

        document.getElementById('refreshVersion').onclick = loadVersion;

        function addLog(time, msg, isError = false) {
            const line = document.createElement('div');
            line.className = 'log-line' + (isError ? ' error' : '');
            line.textContent = `[${time}] ${msg}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function clearLogs() {
            const versionDiv = document.getElementById('versionInfo');
            logBox.innerHTML = '';
            if (versionDiv) {
                logBox.appendChild(versionDiv);
                loadVersion();
            }
        }

        uploadZone.onclick = () => fileInput.click();

        uploadZone.ondragover = (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        };
        uploadZone.ondragleave = () => uploadZone.classList.remove('dragover');
        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                onFileSelect();
            }
        };

        fileInput.onchange = onFileSelect;

        removeFile.onclick = (e) => {
            e.stopPropagation();
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('visible');
            uploadZone.classList.remove('has-file');
            processBtn.disabled = true;
            hideStatus();
        };

        function onFileSelect() {
            selectedFile = fileInput.files[0];
            if (!selectedFile) return;

            fileInfo.classList.add('visible');
            uploadZone.classList.add('has-file');
            fileName.textContent = '✓ ' + selectedFile.name;
            const isVideo = /\.(mp4|avi|mkv|mov|webm|flv|wmv)$/i.test(selectedFile.name);
            fileMeta.textContent = formatSize(selectedFile.size) + ' • ' + (isVideo ? 'Video' : 'Audio');
            processBtn.disabled = false;
            hideStatus();
        }

        processBtn.onclick = async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            result.className = 'result';
            result.innerHTML = '';
            clearLogs();
            loadVersion();

            const formData = new FormData();
            formData.append('file', selectedFile);

            showStatus('Mengirim file...', 'uploading');
            addLog('--', 'Mengirim file: ' + selectedFile.name);

            try {
                const xhr = new XMLHttpRequest();

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded / e.total) * 100);
                        showStatus(`Upload: ${pct}%`, 'uploading');
                    }
                };

                xhr.upload.onload = () => {
                    showStatus('Upload berhasil ✓ Memproses... (dapat memakan waktu beberapa menit)', 'processing');
                    addLog('--', 'Upload berhasil ✓');
                    addLog('--', 'Server memproses: Demucs → Denoiser → Polish...');
                };

                const res = await new Promise((resolve, reject) => {
                    xhr.onload = () => resolve(xhr);
                    xhr.onerror = () => reject(new Error('Upload gagal'));
                    xhr.open('POST', '/api/process');
                    xhr.send(formData);
                });

                if (res.status !== 200 && res.status !== 500) {
                    throw new Error('Upload gagal: ' + res.status);
                }

                const data = JSON.parse(res.responseText);
                data.logs.forEach(l => addLog(l.time, l.msg, l.msg.includes('ERROR')));

                if (data.success) {
                    showStatus('Selesai!', 'success');
                    result.className = 'result success';
                    result.innerHTML = `✓ Selesai! <a href="/api/download/${data.output_file}" download>Download ${data.output_file}</a>`;
                } else {
                    showStatus('Error: ' + data.error, 'error');
                    result.className = 'result error';
                    result.innerHTML = `✗ Error: ${data.error}`;
                }
            } catch (err) {
                showStatus('Gagal: ' + err.message, 'error');
                addLog('--', 'ERROR: ' + err.message, true);
                result.className = 'result error';
                result.innerHTML = '✗ Gagal: ' + err.message;
            } finally {
                processBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
