<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Enhancer - Demucs → Denoiser → Resemble Enhance</title>
    <style>
        :root {
            --bg: #0f0f12;
            --surface: #1a1a20;
            --surface-hover: #22222a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --error: #ef4444;
            --text: #e4e4e7;
            --text-muted: #71717a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--surface-hover);
            padding-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
        }
        .version {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        .upload-zone {
            border: 2px dashed var(--surface-hover);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            background: var(--surface);
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--surface-hover);
        }
        .upload-zone input { display: none; }
        .upload-zone p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .log-section {
            margin-top: 2rem;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .log-header h2 { font-size: 1rem; }
        .log-box {
            background: #0a0a0c;
            border: 1px solid var(--surface-hover);
            border-radius: 8px;
            padding: 1rem;
            height: 320px;
            overflow-y: auto;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        .log-line {
            font-family: inherit;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-line .time { color: var(--text-muted); margin-right: 0.5rem; }
        .log-line.error { color: var(--error); }
        .log-line .tag { color: var(--accent); }
        .result {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--surface);
            border-radius: 8px;
            display: none;
        }
        .result.success { display: block; border-left: 4px solid var(--success); }
        .result.error { display: block; border-left: 4px solid var(--error); }
        .result a {
            color: var(--accent);
            text-decoration: none;
        }
        .result a:hover { text-decoration: underline; }
        .loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Audio Enhancer</h1>
            <p class="version">v{{ version }} | Demucs → Denoiser (HEAVY) → Resemble Enhance</p>
        </header>

        <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept=".mp3,.wav,.flac,.m4a,.ogg,.aac,.wma,.mp4,.avi,.mkv,.mov,.webm,.flv,.wmv">
            <p><strong>Klik atau drag file</strong> untuk upload</p>
            <p>Audio: MP3, WAV, FLAC, M4A, OGG, AAC, WMA</p>
            <p>Video: MP4, AVI, MKV, MOV, WEBM, FLV, WMV</p>
        </div>

        <button class="btn" id="processBtn" disabled>Proses</button>

        <div class="log-section">
            <div class="log-header">
                <h2>Log Proses</h2>
                <button class="btn" id="refreshVersion" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Refresh Version</button>
            </div>
            <div class="log-box" id="logBox">
                <div class="log-line" id="versionInfo">Memuat info versi...</div>
            </div>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const logBox = document.getElementById('logBox');
        const result = document.getElementById('result');
        const versionInfo = document.getElementById('versionInfo');

        let selectedFile = null;

        function loadVersion() {
            fetch('/api/version')
                .then(r => r.json())
                .then(data => {
                    versionInfo.textContent = data.info;
                    versionInfo.className = 'log-line';
                })
                .catch(() => {
                    versionInfo.textContent = 'Gagal memuat info versi';
                    versionInfo.className = 'log-line error';
                });
        }
        loadVersion();

        document.getElementById('refreshVersion').onclick = loadVersion;

        function addLog(time, msg, isError = false) {
            const line = document.createElement('div');
            line.className = 'log-line' + (isError ? ' error' : '');
            line.textContent = `[${time}] ${msg}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function clearLogs() {
            const versionDiv = document.getElementById('versionInfo');
            logBox.innerHTML = '';
            if (versionDiv) {
                logBox.appendChild(versionDiv);
                loadVersion();
            }
        }

        uploadZone.onclick = () => fileInput.click();

        uploadZone.ondragover = (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        };
        uploadZone.ondragleave = () => uploadZone.classList.remove('dragover');
        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                onFileSelect();
            }
        };

        fileInput.onchange = onFileSelect;

        function onFileSelect() {
            selectedFile = fileInput.files[0];
            processBtn.disabled = !selectedFile;
        }

        processBtn.onclick = async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            result.className = 'result';
            result.innerHTML = '<span style="color: var(--accent);">⏳ Memproses... (dapat memakan waktu beberapa menit)</span>';
            clearLogs();
            loadVersion();

            const formData = new FormData();
            formData.append('file', selectedFile);

            addLog('--', 'Mengirim file...');
            try {
                const res = await fetch('/api/process', {
                    method: 'POST',
                    body: formData,
                });
                const data = await res.json();

                data.logs.forEach(l => addLog(l.time, l.msg, l.msg.includes('ERROR')));

                if (data.success) {
                    result.className = 'result success';
                    result.innerHTML = `✓ Selesai! <a href="/api/download/${data.output_file}" download>Download ${data.output_file}</a>`;
                } else {
                    result.className = 'result error';
                    result.innerHTML = `✗ Error: ${data.error}`;
                }
            } catch (err) {
                addLog('--', 'ERROR: ' + err.message, true);
                result.className = 'result error';
                result.innerHTML = '✗ Gagal: ' + err.message;
            } finally {
                processBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
